<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voa Parente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            border: 3px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 10;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            color: #ffdd57;
        }

        h2 {
            font-size: 1.8em;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        p {
            font-size: 1.1em;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 20px;
        }

        .score-display {
            font-size: 1.5em;
            margin: 10px 0;
            color: #ffdd57;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: #ffdd57;
            color: #333;
            font-weight: bold;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5em;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="score">0</div>

        <div id="startScreen">
            <h1>🐦 Voa Parente</h1>
            <p>Clique ou pressione ESPAÇO para voar!</p>
            <button class="btn" onclick="startGame()">JOGAR</button>
        </div>

        <div id="gameOverScreen">
            <h2>💀 MORREU!</h2>
            <div class="score-display">Pontuação: <span id="finalScore">0</span></div>
            <div class="score-display">Recorde: <span id="bestScore">0</span></div>
            <button class="btn" onclick="startGame()">TENTAR DE NOVO</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const bestScoreEl = document.getElementById('bestScore');

        // Carregar imagem do irmão
        const birdImg = new Image();
        birdImg.src = 'irmao.png'; // COLOQUE A FOTO AQUI

        // Configurações do jogo
        const GRAVITY = 0.5;
        const JUMP_FORCE = -8;
        const PIPE_SPEED = 3;
        const PIPE_GAP_START = 220; // vão inicial maior (mais fácil)
        const PIPE_GAP_MIN = 140;   // vão mínimo (mais difícil)
        const PIPE_WIDTH = 60;
        const BIRD_SIZE = 50;

        let bird, pipes, score, bestScore, gameRunning, animationId, currentGap;

        bestScore = localStorage.getItem('flappyBestScore') || 0;

        function initGame() {
            bird = {
                x: 80,
                y: 300,
                velocity: 0,
                size: BIRD_SIZE,
                rotation: 0
            };
            pipes = [];
            score = 0;
            currentGap = PIPE_GAP_START;
            scoreDisplay.textContent = '0';
        }

        function startGame() {
            initGame();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameRunning = true;
            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }

        function jump() {
            if (!gameRunning) return;
            bird.velocity = JUMP_FORCE;
        }

        function addPipe() {
            // Reduz o vão gradualmente conforme a pontuação sobe
            currentGap = Math.max(PIPE_GAP_MIN, PIPE_GAP_START - score * 5);

            const minY = 80;
            const maxY = canvas.height - currentGap - 80;
            const topHeight = Math.random() * (maxY - minY) + minY;

            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + currentGap,
                scored: false
            });
        }

        function update() {
            // Gravidade no pássaro
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Rotação baseada na velocidade
            bird.rotation = Math.min(bird.velocity * 3, 90);
            bird.rotation = Math.max(bird.rotation, -30);

            // Gerar canos
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
                addPipe();
            }

            // Mover canos
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= PIPE_SPEED;

                // Pontuação
                if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < bird.x) {
                    pipes[i].scored = true;
                    score++;
                    scoreDisplay.textContent = score;
                }

                // Remover canos fora da tela
                if (pipes[i].x + PIPE_WIDTH < 0) {
                    pipes.splice(i, 1);
                }
            }

            // Colisões
            if (bird.y + bird.size / 2 > canvas.height || bird.y - bird.size / 2 < 0) {
                gameOver();
                return;
            }

            for (let pipe of pipes) {
                // Hitbox do pássaro (circular, um pouco menor que visual)
                const birdLeft = bird.x - bird.size / 2 + 8;
                const birdRight = bird.x + bird.size / 2 - 8;
                const birdTop = bird.y - bird.size / 2 + 8;
                const birdBottom = bird.y + bird.size / 2 - 8;

                if (birdRight > pipe.x && birdLeft < pipe.x + PIPE_WIDTH) {
                    if (birdTop < pipe.topHeight || birdBottom > pipe.bottomY) {
                        gameOver();
                        return;
                    }
                }
            }
        }

        function draw() {
            // Fundo - céu gradiente
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.7, '#98D8E8');
            gradient.addColorStop(1, '#228B22');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Chão
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 25, canvas.width, 8);

            // Nuvens simples
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.arc(100, 80, 25, 0, Math.PI * 2);
            ctx.arc(130, 80, 30, 0, Math.PI * 2);
            ctx.arc(160, 80, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(300, 120, 20, 0, Math.PI * 2);
            ctx.arc(325, 120, 25, 0, Math.PI * 2);
            ctx.arc(350, 120, 20, 0, Math.PI * 2);
            ctx.fill();

            // Canos
            for (let pipe of pipes) {
                // Cano de cima
                const pipeGradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_WIDTH, 0);
                pipeGradient.addColorStop(0, '#2d8a2d');
                pipeGradient.addColorStop(0.5, '#4CAF50');
                pipeGradient.addColorStop(1, '#2d8a2d');

                ctx.fillStyle = pipeGradient;
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
                // Borda do cano de cima
                ctx.fillRect(pipe.x - 5, pipe.topHeight - 25, PIPE_WIDTH + 10, 25);

                // Cano de baixo
                ctx.fillStyle = pipeGradient;
                ctx.fillRect(pipe.x, pipe.bottomY, PIPE_WIDTH, canvas.height - pipe.bottomY);
                // Borda do cano de baixo
                ctx.fillRect(pipe.x - 5, pipe.bottomY, PIPE_WIDTH + 10, 25);

                // Contorno dos canos
                ctx.strokeStyle = '#1a5c1a';
                ctx.lineWidth = 2;
                ctx.strokeRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
                ctx.strokeRect(pipe.x - 5, pipe.topHeight - 25, PIPE_WIDTH + 10, 25);
                ctx.strokeRect(pipe.x, pipe.bottomY, PIPE_WIDTH, canvas.height - pipe.bottomY);
                ctx.strokeRect(pipe.x - 5, pipe.bottomY, PIPE_WIDTH + 10, 25);
            }

            // Pássaro (foto do irmão)
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate((bird.rotation * Math.PI) / 180);

            // Círculo de clipping para a foto ficar redonda
            ctx.beginPath();
            ctx.arc(0, 0, bird.size / 2, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();

            if (birdImg.complete && birdImg.naturalWidth > 0) {
                // Desenhar a imagem centralizada e proporcional
                const imgRatio = birdImg.naturalWidth / birdImg.naturalHeight;
                let drawW, drawH;
                if (imgRatio > 1) {
                    drawH = bird.size;
                    drawW = bird.size * imgRatio;
                } else {
                    drawW = bird.size;
                    drawH = bird.size / imgRatio;
                }
                ctx.drawImage(birdImg, -drawW / 2, -drawH / 2, drawW, drawH);
            } else {
                // Fallback: círculo amarelo
                ctx.fillStyle = '#FFD700';
                ctx.fill();
            }

            ctx.restore();

            // Borda ao redor da foto
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.size / 2 + 2, 0, Math.PI * 2);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Asinhas engraçadas
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate((bird.rotation * Math.PI) / 180);
            // Asa esquerda
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.ellipse(-bird.size / 2 - 5, 5, 12, 7, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBestScore', bestScore);
            }

            finalScoreEl.textContent = score;
            bestScoreEl.textContent = bestScore;
            gameOverScreen.style.display = 'flex';
        }

        // Controles
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (!gameRunning && startScreen.style.display !== 'none') {
                    startGame();
                } else {
                    jump();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (gameRunning) jump();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) jump();
        });
    </script>
</body>
</html>
